<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陈旸朗 | Portfolio v3.9.0</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39FF14;
            --album-pink: #ff0088; 
            --bg-black: #0a0a0a;
            --panel-bg: #121212;
            --transition-speed: 0.35s;
            --macau-warm: #ff5722;
            --temple-red: #ff3333; 
            --grape-purple: #b026ff; 
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-black) !important; 
            color: white;
            font-family: 'DotGothic16', sans-serif;
            overflow: hidden; /* 严禁外层穿透滚动 */
        }

        /* ==================== 核心容器重构（拒绝死锁） ==================== */
        .page-container {
            position: fixed; /* 改用 fixed，锁定物理视口，防止滚动条高度塌陷 */
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            
            /* 100% 物理隐匿：display + visibility 双保险，彻底从浏览器射线检测中蒸发，绝对不拦截任何点击 */
            display: none !important; 
            visibility: hidden !important; 
            pointer-events: none !important;
            
            opacity: 0;
            transition: opacity var(--transition-speed) ease-in-out;
            z-index: 1;
            
            /* 允许容器内部安全滚动，且不影响外部视口 */
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 40px 20px;
        }

        /* 核心修复：激活状态不仅是显示，更是在底层图层架构上强行置顶 */
        .page-container.active {
            display: block !important; /* 切换为块级，利于长文本自然向下延伸与滚动条计算 */
            visibility: visible !important;
            pointer-events: auto !important; /* 瞬间激活最高交互权 */
            opacity: 1 !important;
            z-index: 9999 !important; /* 强制凌驾于一切隐形图层之上，粉碎“防弹玻璃”效应 */
        }

        /* 针对需要居中对齐的首页和目录页，单独恢复 flex 布局 */
        #home-page.active, #menu-page.active {
            display: flex !important;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 隐藏与定制滚动条（确保各子页面滚动丝滑） */
        .page-container::-webkit-scrollbar {
            width: 6px;
        }
        .page-container::-webkit-scrollbar-thumb {
            border-radius: 3px;
        }
        #page-1::-webkit-scrollbar-thumb { background: var(--neon-green); }
        #page-2::-webkit-scrollbar-thumb { background: var(--album-pink); }
        #page-3::-webkit-scrollbar-thumb { background: var(--temple-red); }
        #page-4::-webkit-scrollbar-thumb { background: var(--macau-warm); }
        #page-5::-webkit-scrollbar-thumb { background: var(--grape-purple); }

        /* ==================== 以下完全保留您原汁原味的视觉与排版系统 ==================== */
        h1 {
            font-size: clamp(2.5rem, 8vw, 6rem);
            margin: 0;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .name {
            font-size: 1.5rem;
            margin-top: 10px;
            color: #ccc;
            letter-spacing: 5px;
        }

        .neon-btn {
            background-color: black;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .neon-btn:hover {
            background-color: var(--neon-green);
            color: black;
            box-shadow: 0 0 30px var(--neon-green);
        }

        .enter-btn {
            position: absolute;
            bottom: 15%;
            padding: 15px 40px;
            font-size: 2rem;
            z-index: 20;
        }

        .back-btn-corner {
            position: fixed; /* 悬浮固定，不受内容滚动影响 */
            top: 30px;
            left: 30px;
            width: 50px;
            height: 50px;
            border-radius: 5px;
            z-index: 10000; /* 确保返回按钮绝对可点 */
        }

        .menu-list {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
        }

            font-size: clamp(1.2rem, 4vw, 2.2rem);
            color: var(--neon-green);
            text-decoration: none;
